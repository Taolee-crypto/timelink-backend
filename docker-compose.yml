version: '3.8'

services:
  # SQLite 개발 데이터베이스
  # 로컬 개발용으로 SQLite 사용
  # 실제 운영에서는 Cloudflare D1 사용
  
  # MinIO (S3 호환 로컬 스토리지)
  minio:
    image: minio/minio
    container_name: timelink-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Redis 캐시
  redis:
    image: redis:alpine
    container_name: timelink-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  # 개발용 관리자 인터페이스
  adminer:
    image: adminer
    container_name: timelink-adminer
    ports:
      - "8080:8080"
    depends_on:
      - minio

volumes:
  minio-data:
  redis-data:
