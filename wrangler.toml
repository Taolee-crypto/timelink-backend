name = "timelink-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
JWT_SECRET = "${JWT_SECRET}"
API_BASE_URL = "https://timelink.digital"

[[d1_databases]]
binding = "DB"
database_name = "timelink-db"
database_id = "your-database-id-here"

[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-id-here"

[env.production]
zone_id = "your_zone_id"
routes = [
  { pattern = "api.timelink.digital/*", zone_id = "your_zone_id" }
]
