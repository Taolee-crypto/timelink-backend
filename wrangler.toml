# 현재 wrangler.toml (예상)
name = "timelink-backend"
main = "src/index.js"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "timelink_users"
database_name = "timelink-users"
database_id = "22d08400-856b-432c-bf7a-ca01bd3f601a"

[vars]
ENV = "dev"

# ========== 여기 아래 내용을 추가하세요 ==========
[env.production]
# 프로덕션 환경에서 사용할 변수 설정
ENV = "production"
# 필요하다면 프로덕션 전용 데이터베이스 ID 등을 여기에 별도로 설정할 수 있습니다.
