<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK 서버 연결 테스트</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #333; }
        #result { 
            background: #f5f5f5; 
            border: 1px solid #ddd; 
            padding: 15px; 
            margin: 20px 0; 
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            max-height: 500px;
            overflow-y: auto;
        }
        button { 
            padding: 10px 20px; 
            background: #6C63FF; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #5a52d5; }
        .error { color: #d32f2f; }
        .success { color: #388e3c; }
        .warning { color: #f57c00; }
    </style>
</head>
<body>
    <h1>🚀 TIMELINK 백엔드 서버 연결 테스트</h1>
    <p>아래 버튼을 클릭하여 실제 서버 연결을 테스트합니다.</p>
    <button onclick="runTest()">서버 연결 테스트 실행</button>
    <div id="result"></div>
    
    <script>
        const resultDiv = document.getElementById('result');
        
        function logToDiv(message, className = '') {
            const p = document.createElement('p');
            p.textContent = message;
            if (className) p.className = className;
            resultDiv.appendChild(p);
            resultDiv.scrollTop = resultDiv.scrollHeight;
        }
        
        // TIMELINK 백엔드 서버 연결 테스트
async function testServerConnection() {
    const apiUrl = 'https://timelink-backend.timelink-api.workers.dev';
    const endpoints = [
        { name: 'Health Check', url: \\/health\, method: 'GET' },
        { name: 'CORS Preflight', url: \\/api/auth/login\, method: 'OPTIONS' },
        { name: 'Login API', url: \\/api/auth/login\, method: 'POST' },
        { name: 'Signup API', url: \\/api/auth/signup\, method: 'POST' }
    ];
    
    console.log('=== TIMELINK 백엔드 서버 연결 테스트 ===');
    console.log(\서버: \\);
    console.log('테스트 시작 시간:', new Date().toISOString());
    console.log('');
    
    for (const endpoint of endpoints) {
        console.log(\테스트: \\);
        console.log(\URL: \\);
        console.log(\메소드: \\);
        
        try {
            const options = {
                method: endpoint.method,
                headers: {
                    'Content-Type': 'application/json',
                    'Origin': window.location.origin
                }
            };
            
            if (endpoint.method === 'POST') {
                options.body = JSON.stringify({
                    email: 'test@timelink.digital',
                    password: 'test123'
                });
            }
            
            const startTime = performance.now();
            const response = await fetch(endpoint.url, options);
            const endTime = performance.now();
            const responseTime = Math.round(endTime - startTime);
            
            console.log(\상태: \ \\);
            console.log(\응답 시간: \ms\);
            
            // CORS 헤더 확인
            if (endpoint.method === 'OPTIONS' || endpoint.name.includes('CORS')) {
                const corsHeaders = {
                    'Access-Control-Allow-Origin': response.headers.get('Access-Control-Allow-Origin'),
                    'Access-Control-Allow-Methods': response.headers.get('Access-Control-Allow-Methods'),
                    'Access-Control-Allow-Headers': response.headers.get('Access-Control-Allow-Headers'),
                    'Access-Control-Allow-Credentials': response.headers.get('Access-Control-Allow-Credentials')
                };
                console.log('CORS 헤더:', corsHeaders);
            }
            
            try {
                const data = await response.text();
                console.log('응답 데이터:', data.length > 200 ? data.substring(0, 200) + '...' : data);
            } catch (e) {
                console.log('응답 데이터 파싱 실패');
            }
            
        } catch (error) {
            console.log(\에러: \\);
            console.log(\에러 타입: \\);
            
            // 네트워크 에러인 경우
            if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                console.log('⚠ 네트워크 연결 문제가 발생했습니다.');
                console.log('가능한 원인:');
                console.log('1. 서버가 다운되었습니다');
                console.log('2. CORS 정책에 의해 차단되었습니다');
                console.log('3. 네트워크 방화벽이 차단했습니다');
                console.log('4. SSL 인증서 문제가 있습니다');
            }
            
            // CORS 에러인 경우
            if (error.message.includes('CORS') || error.message.includes('cross-origin')) {
                console.log('⚠ CORS 정책 위반입니다.');
                console.log('백엔드 서버에 다음 헤더가 필요합니다:');
                console.log('Access-Control-Allow-Origin: * (또는 도메인)');
                console.log('Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS');
                console.log('Access-Control-Allow-Headers: Content-Type, Authorization');
            }
        }
        
        console.log('---');
    }
    
    console.log('테스트 완료 시간:', new Date().toISOString());
}

// 테스트 실행
testServerConnection();
        
        function runTest() {
            resultDiv.innerHTML = '';
            console.log('테스트 시작...');
            testServerConnection();
            
            // 콘솔 출력을 div로 리디렉션
            const originalLog = console.log;
            const originalError = console.error;
            const originalWarn = console.warn;
            
            console.log = function(...args) {
                originalLog.apply(console, args);
                logToDiv(args.join(' '));
            };
            
            console.error = function(...args) {
                originalError.apply(console, args);
                logToDiv(args.join(' '), 'error');
            };
            
            console.warn = function(...args) {
                originalWarn.apply(console, args);
                logToDiv(args.join(' '), 'warning');
            };
            
            // 테스트 완료 후 원래대로 복원
            setTimeout(() => {
                console.log = originalLog;
                console.error = originalError;
                console.warn = originalWarn;
                logToDiv('테스트가 완료되었습니다.', 'success');
            }, 5000);
        }
    </script>
</body>
</html>
